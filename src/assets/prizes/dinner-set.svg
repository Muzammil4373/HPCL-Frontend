<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#D2691E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#D2691E" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="480" height="360" fill="#1a0a00"/>
  <rect width="480" height="360" fill="url(#bg)"/>
  
  <!-- Decorative corner lines -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="20" x2="420" y2="20" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="20" x2="460" y2="60" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="340" x2="60" y2="340" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="340" x2="20" y2="300" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="340" x2="420" y2="340" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  <line x1="460" y1="340" x2="460" y2="300" stroke="#f5a623" stroke-width="2" opacity="0.6"/>
  
  <!-- Border -->
  <rect x="12" y="12" width="456" height="336" fill="none" stroke="url(#border)" stroke-width="1.5" rx="16" opacity="0.7"/>
  
  <!-- Glow circle behind emoji -->
  <circle cx="240" cy="155" r="80" fill="#D2691E" opacity="0.15"/>
  <circle cx="240" cy="155" r="60" fill="#D2691E" opacity="0.1"/>
  
  <!-- Emoji -->
  <text x="240" y="185" font-size="90" text-anchor="middle" dominant-baseline="middle" >🍽️</text>
  
  <!-- Prize label -->
  <text x="240" y="258" font-size="32" font-weight="bold" text-anchor="middle" 
        fill="#f5a623" font-family="Arial, sans-serif" letter-spacing="2">DINNER SET</text>
  
  <!-- Sub label -->
  <text x="240" y="295" font-size="14" text-anchor="middle" fill="#D2691E" 
        font-family="Arial, sans-serif" letter-spacing="3" opacity="0.9">Premium Crockery Collection</text>
  
  <!-- Bottom line -->
  <line x1="160" y1="318" x2="320" y2="318" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
  <text x="240" y="335" font-size="10" text-anchor="middle" fill="#f5a623" 
        font-family="Arial, sans-serif" letter-spacing="2" opacity="0.5">HP PETROLEUM LUCKY DRAW</text>
</svg>